<span class="fs-badge" [ngClass]="classes" [ngStyle]="customStyles">

  <!-- dot de estado -->
  <span *ngIf="dot" class="fs-badge__dot" aria-hidden="true"></span>

  <!-- imagen izquierda (prioridad sobre iconLeft) -->
  <span *ngIf="imgLeft" class="fs-badge__icon fs-badge__icon--left" aria-hidden="true">
    <img [src]="imgLeft" [alt]="imgLeftAlt" class="fs-badge__img" />
  </span>

  <!-- ícono izquierdo SVG (solo si no hay imgLeft) -->
  <span *ngIf="iconLeft && !imgLeft" class="fs-badge__icon fs-badge__icon--left" aria-hidden="true">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
      <path [attr.d]="iconLeft"/>
    </svg>
  </span>

  <!-- label — oculto en iconOnly -->
  <span *ngIf="!iconOnly" class="fs-badge__label">
    <ng-content>{{ label }}</ng-content>
  </span>

  <!-- imagen derecha (prioridad sobre iconRight) -->
  <span *ngIf="imgRight" class="fs-badge__icon fs-badge__icon--right" aria-hidden="true">
    <img [src]="imgRight" [alt]="imgRightAlt" class="fs-badge__img" />
  </span>

  <!-- ícono derecho SVG (solo si no hay imgRight) -->
  <span *ngIf="iconRight && !imgRight" class="fs-badge__icon fs-badge__icon--right" aria-hidden="true">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
      <path [attr.d]="iconRight"/>
    </svg>
  </span>

  <!-- botón remove -->
  <button
    *ngIf="removable"
    class="fs-badge__remove"
    type="button"
    aria-label="Remover"
    (click)="onRemove($event)"
  >
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
      <path d="M2 2l6 6M8 2L2 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>

</span>
