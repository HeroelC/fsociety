<div class="fs-profile">

  <!-- banner -->
  <div class="fs-profile__banner">
    <img
      *ngIf="bannerUrl"
      [src]="bannerUrl"
      [alt]="name + ' banner'"
      class="fs-profile__banner-img"
    />
    <div *ngIf="!bannerUrl" class="fs-profile__banner-gradient"></div>
    <div class="fs-profile__banner-line"></div>
  </div>

  <!-- body -->
  <div class="fs-profile__body">

    <!-- avatar -->
    <div class="fs-profile__avatar-wrap">
      <div class="fs-profile__avatar">
        <img
          *ngIf="avatarUrl"
          [src]="avatarUrl"
          [alt]="name"
          class="fs-profile__avatar-img"
        />
        <span *ngIf="!avatarUrl" class="fs-profile__avatar-initials">
          {{ initials }}
        </span>
      </div>
      <div *ngIf="verified" class="fs-profile__verified" aria-label="Verificado">
        <svg width="9" height="9" viewBox="0 0 10 10" fill="none">
          <path d="M2 5l2 2 4-4"
            stroke="white" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <!-- identidad -->
    <div class="fs-profile__name">{{ name }}</div>
    <div *ngIf="handle" class="fs-profile__handle">&#64;{{ handle }}</div>
    <div *ngIf="role" class="fs-profile__role">{{ role }}</div>

    <!-- acciones -->
    <div *ngIf="showActions" class="fs-profile__actions">
      <button
        class="fs-profile__btn fs-profile__btn--primary"
        type="button"
        (click)="primaryAction.emit()"
      >
        {{ primaryActionLabel }}
      </button>
      <button
        class="fs-profile__btn fs-profile__btn--outline"
        type="button"
        (click)="secondaryAction.emit()"
      >
        {{ secondaryActionLabel }}
      </button>
    </div>

    <!-- links -->
    <div *ngIf="links.length" class="fs-profile__links">
      <a
        *ngFor="let link of links"
        class="fs-profile__link"
        [href]="link.url || '#'"
        [attr.target]="link.url ? '_blank' : null"
        [attr.rel]="link.url ? 'noopener noreferrer' : null"
      >
        <!-- imagen del link (prioridad sobre icon SVG) -->
        <img
          *ngIf="link.imgUrl"
          [src]="link.imgUrl"
          [alt]="link.imgAlt || ''"
          class="fs-profile__link-img"
          aria-hidden="true"
        />
        <!-- ícono SVG (solo si no hay imgUrl) -->
        <svg
          *ngIf="link.icon && !link.imgUrl"
          width="12" height="12"
          viewBox="0 0 16 16"
          fill="none"
          aria-hidden="true"
        >
          <path [attr.d]="link.icon" stroke="currentColor" stroke-width="1.3"
            stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>{{ link.label }}</span>
      </a>
    </div>

    <!-- badges -->
    <div *ngIf="badges.length" class="fs-profile__badges">
      <fs-badge
        *ngFor="let badge of badges"
        [color]="badge.color || 'neutral'"
        [customColor]="badge.customColor"
        [iconLeft]="badge.iconLeft"
        [imgLeft]="badge.imgLeft"
        [imgLeftAlt]="badge.imgLeftAlt || ''"
        variant="filled"
        size="sm"
      >{{ badge.label }}</fs-badge>
    </div>

  </div>

  <!-- stats footer -->
  <div *ngIf="stats.length" class="fs-profile__stats">
    <div *ngFor="let stat of stats" class="fs-profile__stat">
      <span class="fs-profile__stat-value">{{ stat.value }}</span>
      <span class="fs-profile__stat-label">{{ stat.label }}</span>
    </div>
  </div>

</div>
